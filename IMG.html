<!DOCTYPE html>
<html>
<head>
    <title>Image and Link Page</title>

    <style>
        body {
            background-color: rgb(185, 184, 227);
            font-family: Arial, sans-serif;
            text-align: center;
        }

        img {
            width: 300px;
            height: 200px;
            border-radius: 20px;
            border: 3px solid darkblue;
        }

        a {
            text-decoration: none;
            color: darkred;
            font-size: 20px;
            font-weight: bold;
        }

        a:hover {
            color: blue;
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <h1>Image and Anchor Tag Example</h1>

    <p>Below is an image with attributes and CSS styling:</p>

    <img src="images/nature.png" alt="Nature Image" title="Beautiful Nature Image">

    <br><br>

    <p>Click the link below to visit Google:</p>

    <a href="https://www.google.com" target="_blank" title="Go to Google Website">
        Visit Google
    </a>

</body>
</html>
