<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us Page</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }

    header {
      text-align: center;
      padding: 20px;
      background: #111;
      color: white;
      font-size: 26px;
      font-weight: bold;
    }

    .contact-container {
      max-width: 1100px;
      margin: 30px auto;
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0px 4px 12px rgba(0,0,0,0.2);

      display: flex;
      gap: 20px;
    }

    /* Contact Form Section */
    .contact-form {
      width: 50%;
    }

    .contact-form h2 {
      margin-top: 0;
      font-size: 24px;
      color: #222;
    }

    .contact-form label {
      font-weight: bold;
      display: block;
      margin: 10px 0 5px;
    }

    .contact-form input,
    .contact-form textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
    }

    .contact-form textarea {
      resize: none;
      height: 120px;
    }

    .contact-form button {
      margin-top: 15px;
      width: 100%;
      padding: 12px;
      background: #0077ff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .contact-form button:hover {
      background: #0056c7;
    }

    /* Map Section */
    .map-section {
      width: 50%;
      border-radius: 15px;
      overflow: hidden;
    }

    .map-section iframe {
      width: 100%;
      height: 100%;
      min-height: 400px;
      border: none;
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      .contact-container {
        flex-direction: column;
      }

      .contact-form {
        width: 100%;
      }

      .map-section {
        width: 100%;
      }

      .map-section iframe {
        min-height: 300px;
      }
    }
  </style>
</head>

<body>

  <header>📞 Contact Us</header>

  <div class="contact-container">

    <!-- Contact Form -->
    <div class="contact-form">
      <h2>Get in Touch</h2>

      <form>
        <label>Full Name</label>
        <input type="text" placeholder="Enter your name" required>

        <label>Email</label>
        <input type="email" placeholder="Enter your email" required>

        <label>Phone</label>
        <input type="tel" placeholder="Enter your phone number">

        <label>Message</label>
        <textarea placeholder="Write your message..." required></textarea>

        <button type="submit">Send Message</button>
      </form>
    </div>

    <!-- Embedded Map -->
    <div class="map-section">
      <iframe 
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3783.054094538007!2d73.84746547496228!3d18.52043098257456!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bc2c07f4e44d1c3%3A0x3a7c1b5a6a1fcd6f!2sPune%2C%20Maharashtra!5e0!3m2!1sen!2sin!4v1700000000000"
        allowfullscreen=""
        loading="lazy">
      </iframe>
    </div>

  </div>

</body>
</html>
