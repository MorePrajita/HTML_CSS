<!DOCTYPE html>
<html>
<head>
    <title>Idol Profile Page</title>

    <style>
        body {
            background-color: lavender;
            font-family: Arial, sans-serif;
        }

        .idol-profile {
            width: 450px;
            background-color: white;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
            border-radius: 12px;
        }

        img {
            width: 200px;
            height: 200px;
            border: 4px solid purple;
            border-radius: 15px;
        }

        h1 {
            color: darkblue;
            font-style: italic;
        }

        p {
            font-size: 16px;
            font-style: oblique;
            color: black;
        }

        a {
            text-decoration: none;
            color: darkred;
            font-weight: bold;
        }

        a:hover {
            color: blue;
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="idol-profile">
        <h1>Idol Profile</h1>

        <img src="images/idol.png" alt="Idol Image">

        <h2>Idol Name: BTS - V (Kim Taehyung)</h2>

        <p>
            V is a South Korean singer, songwriter, and member of BTS.
            He is known for his deep voice, unique visuals, and charming personality.
        </p>

        <a href="https://en.wikipedia.org/wiki/V_(singer)" target="_blank">
            Click here for more information
        </a>
    </div>

</body>
</html>
