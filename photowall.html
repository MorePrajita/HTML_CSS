<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Photo Wall</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }

    h1 {
      text-align: center;
      padding: 20px;
      margin: 0;
      background: #111;
      color: white;
      font-size: 28px;
    }

    /* Responsive Grid Without Breakpoints */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
      padding: 20px;
      max-width: 1200px;
      margin: auto;
    }

    /* Image Card */
    .photo-card {
      position: relative;
      overflow: hidden;
      border-radius: 15px;
      cursor: pointer;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
    }

    .photo-card img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }

    /* Hover Zoom Effect */
    .photo-card:hover img {
      transform: scale(1.15);
    }

    /* Overlay Text */
    .overlay {
      position: absolute;
      bottom: 0;
      width: 100%;
      padding: 12px;
      background: rgba(0,0,0,0.6);
      color: white;
      font-size: 18px;
      text-align: center;
      transform: translateY(100%);
      transition: 0.4s ease;
    }

    /* Show Overlay on Hover */
    .photo-card:hover .overlay {
      transform: translateY(0);
    }
  </style>
</head>

<body>

  <h1>📸 Interactive Photo Wall</h1>

  <div class="gallery">

    <div class="photo-card">
      <img src="https://picsum.photos/500/400?random=1" alt="Photo 1">
      <div class="overlay">Photo 1</div>
    </div>

    <div class="photo-card">
      <img src="https://picsum.photos/500/400?random=2" alt="Photo 2">
      <div class="overlay">Photo 2</div>
    </div>

    <div class="photo-card">
      <img src="https://picsum.photos/500/400?random=3" alt="Photo 3">
      <div class="overlay">Photo 3</div>
    </div>

    <div class="photo-card">
      <img src="https://picsum.photos/500/400?random=4" alt="Photo 4">
      <div class="overlay">Photo 4</div>
    </div>

    <div class="photo-card">
      <img src="https://picsum.photos/500/400?random=5" alt="Photo 5">
      <div class="overlay">Photo 5</div>
    </div>

    <div class="photo-card">
      <img src="https://picsum.photos/500/400?random=6" alt="Photo 6">
      <div class="overlay">Photo 6</div>
    </div>

    <div class="photo-card">
      <img src="https://picsum.photos/500/400?random=7" alt="Photo 7">
      <div class="overlay">Photo 7</div>
    </div>

    <div class="photo-card">
      <img src="https://picsum.photos/500/400?random=8" alt="Photo 8">
      <div class="overlay">Photo 8</div>
    </div>

    <div class="photo-card">
      <img src="https://picsum.photos/500/400?random=9" alt="Photo 9">
      <div class="overlay">Photo 9</div>
    </div>

    <div class="photo-card">
      <img src="https://picsum.photos/500/400?random=10" alt="Photo 10">
      <div class="overlay">Photo 10</div>
    </div>

    <div class="photo-card">
      <img src="https://picsum.photos/500/400?random=11" alt="Photo 11">
      <div class="overlay">Photo 11</div>
    </div>

    <div class="photo-card">
      <img src="https://picsum.photos/500/400?random=12" alt="Photo 12">
      <div class="overlay">Photo 12</div>
    </div>

  </div>

</body>
</html>
