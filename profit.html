<!DOCTYPE html>
<html>
<head>
    <title>Total Sales and Profit</title>

    <style>
        body {
            background-color: #f4f8ff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        h1 {
            text-align: center;
            background-color: navy;
            color: white;
            padding: 15px;
            margin: 0;
        }

        h3 {
            text-align: center;
            color: darkred;
            margin-top: 10px;
        }

        table {
            border-collapse: collapse;
            width: 70%;
            margin: 30px auto;
            background-color: white;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }

        th {
            background-color: darkblue;
            color: white;
            padding: 12px;
            font-size: 18px;
        }

        td {
            text-align: center;
            padding: 12px;
            font-size: 16px;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        tr:hover {
            background-color: lightyellow;
            cursor: pointer;
        }

        th:last-child, td:last-child {
            font-weight: bold;
        }
    </style>

</head>

<body>

    <h1>Company Sales Report</h1>
    <h3>Year 2026</h3>

    <table border="1" cellpadding="10" align="center">
        <tr>
            <th rowspan="2">Product</th>
            <th colspan="2">Sales (₹)</th>
            <th colspan="2">Profit (₹)</th>
        </tr>

        <tr>
            <th>Q1</th>
            <th>Q2</th>
            <th>Q1</th>
            <th>Q2</th>
        </tr>

        <tr>
            <td>Product A</td>
            <td>50,000</td>
            <td>60,000</td>
            <td>10,000</td>
            <td>12,000</td>
        </tr>

        <tr>
            <td>Product B</td>
            <td>40,000</td>
            <td>55,000</td>
            <td>8,000</td>
            <td>11,000</td>
        </tr>

        <tr>
            <th>Total</th>
            <th colspan="2">2,05,000</th>
            <th colspan="2">41,000</th>
        </tr>
    </table>

</body>
</html>
