<!DOCTYPE html>
<html>
<head>
    <title>Profile Page</title>

    <style>
        body {
            background-color: rgb(245, 251, 224);
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: rgb(126, 126, 255);
            font-weight: bold;
            text-decoration: underline;
            letter-spacing: 2px;
        }

        p {
            font-size: 18px;
            line-height: 30px;
            letter-spacing: 1px;
            color: black;
        }

        .highlight {
            font-weight: bold;
            text-decoration: underline;
            color: darkred;
        }
        b {
            color: rgb(254, 3, 200);
        }
    </style>
</head>

<body>

    <h1>My Profile</h1>

    <p>
        Hello! My name is <b>Prajita More</b>.  
        I am studying <i>MCA</i> and I love learning <u>Web Development</u>.
    </p>

    <p>
        My favorite subjects are <mark>HTML</mark>, <mark>CSS</mark>, and <mark>JavaScript</mark>.
        I also enjoy working on <span class="highlight">mini projects</span>.
    </p>

    <p>
        This is an example of <small>small text</small> and this is <del>deleted text</del>.
    </p>

    <p>
        Water formula is H<sub>2</sub>O and square is x<sup>2</sup>.
    </p>

</body>
</html>
