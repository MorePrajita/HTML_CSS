<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 Travel Destination Gallery</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f4f4f4;
    }

    h1 {
      text-align: center;
      padding: 20px;
      background: #0077b6;
      color: white;
      margin: 0;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0px 4px 8px rgba(0,0,0,0.2);
      transition: transform 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .card h3 {
      text-align: center;
      padding: 10px;
      margin: 0;
    }

    /* Tablet view (2 columns) */
    @media (max-width: 900px) {
      .gallery {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    /* Mobile view (1 column) */
    @media (max-width: 600px) {
      .gallery {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <h1>Top Travel Destinations 2026</h1>

  <div class="gallery">

    <div class="card">
      <img src="https://picsum.photos/400/300?random=1" alt="Paris">
      <h3>Paris, France</h3>
    </div>

    <div class="card">
      <img src="https://picsum.photos/400/300?random=2" alt="Tokyo">
      <h3>Tokyo, Japan</h3>
    </div>

    <div class="card">
      <img src="https://picsum.photos/400/300?random=3" alt="Dubai">
      <h3>Dubai, UAE</h3>
    </div>

    <div class="card">
      <img src="https://picsum.photos/400/300?random=4" alt="New York">
      <h3>New York, USA</h3>
    </div>

    <div class="card">
      <img src="https://picsum.photos/400/300?random=5" alt="Bali">
      <h3>Bali, Indonesia</h3>
    </div>

    <div class="card">
      <img src="https://picsum.photos/400/300?random=6" alt="Switzerland">
      <h3>Swiss Alps</h3>
    </div>

    <div class="card">
      <img src="https://picsum.photos/400/300?random=7" alt="Maldives">
      <h3>Maldives</h3>
    </div>

    <div class="card">
      <img src="https://picsum.photos/400/300?random=8" alt="Sydney">
      <h3>Sydney, Australia</h3>
    </div>

  </div>

</body>
</html>
