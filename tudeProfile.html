<!DOCTYPE html>
<html>
<head>
    <title>Student Profile</title>

    <style>
        body {
            background-color: lightgray;
            font-family: Arial, sans-serif;
        }

        .profile {
            background-color: rgb(247, 207, 242);
            width: 400px;
            margin: 50px auto;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        img {
            width: 150px;
            height: 150px;
            border: 3px solid darkblue;
            border-radius: 50%;
            margin: 10px;
            padding: 5px;
            background-color: lightyellow;
        }

        h1 {
            color: darkblue;
        }

        p {
            font-size: 16px;
            color: black;
        }
    </style>
</head>

<body>

    <div class="profile">
        <h1>Student Profile</h1>

        <img src="images/stud.png" alt="Student Image">

        <h2>Name: Prajita More</h2>

        <p>
            Hello! My name is Prajita More. I am a student of MCA.
            I am interested in web development and programming.
        </p>
    </div>

</body>
</html>
